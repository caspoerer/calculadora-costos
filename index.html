<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Pasarela - Gestión Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --secondary: #d4a373; --bg: #f4f7f6; --text: #333; --accent: #e74c3c; --edit: #3498db; --success: #27ae60; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; padding-bottom: 60px; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; position: sticky; top: 0; background: var(--bg); z-index: 10; padding: 5px 0; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #ddd; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.75rem; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h2 { font-size: 1.1rem; color: var(--primary); margin-top: 0; border-bottom: 2px solid var(--secondary); display: inline-block; }
        
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; font-size: 14px; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        
        .btn-acc { width: auto; padding: 6px 12px; font-size: 11px; margin: 2px; color: white; border-radius: 4px; border: none; font-weight: bold; }
        .btn-edit { background: var(--edit); }
        .btn-del { background: var(--accent); }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: #f8f8f8; }
        
        .fila-receta { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--secondary); }
        .loader { text-align: center; color: var(--secondary); font-weight: bold; padding: 20px; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="cambiarTab('registro')">Insumos</button>
        <button class="tab-btn" onclick="cambiarTab('recetas')">Recetas</button>
        <button class="tab-btn" onclick="cambiarTab('inventario')">Inventario</button>
        <button class="tab-btn" onclick="cambiarTab('resumen')">Consolidado</button>
    </div>

    <div id="loading" class="loader">Sincronizando con La Pasarela...</div>

    <div id="registro" class="tab-content active">
        <div class="card">
            <h2 id="tituloIng">Nuevo Insumo</h2>
            <input type="text" id="ingNom" placeholder="Nombre (ej: Salmón)">
            <select id="ingCat">
                <option>Proteína</option>
                <option>No Proteína</option>
            </select>
            <select id="ingUniCompra">
                <option value="kg">Kilo (Kg)</option>
                <option value="lt">Litro (Lt)</option>
                <option value="un">Unidad (Un)</option>
            </select>
            <input type="number" id="ingPre" placeholder="Precio Compra ($)">
            <input type="number" id="ingMerma" value="0" placeholder="% Merma">
            <button onclick="enviarInsumo()" id="btnGuardarI">GUARDAR INSUMO</button>
        </div>
    </div>

    <div id="recetas" class="tab-content">
        <div class="card">
            <h2 id="tituloPlato">Configurar Receta</h2>
            <input type="text" id="platoNom" placeholder="Nombre del Plato">
            <div id="listaIngredientes"></div>
            <button onclick="nuevaFila()" style="background:var(--secondary)">+ AÑADIR INSUMO</button>
            <button onclick="guardarReceta()" style="background:var(--success); margin-top:10px;">GUARDAR ESTRUCTURA</button>
        </div>
    </div>

    <div id="inventario" class="tab-content">
        <div class="card">
            <h2>Precios Vigentes</h2>
            <table id="tablaInventario">
                <thead><tr><th>Insumo</th><th>Precio</th><th>Acción</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="resumen" class="tab-content">
        <div class="card">
            <h2>Costos en Tiempo Real</h2>
            <div style="height:200px;"><canvas id="miGrafico"></canvas></div>
            <table id="tablaPlatos">
                <thead><tr><th>Plato</th><th>Costo Actual</th><th>Acción</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

<script>
    // 🔗 CONFIGURACIÓN
    const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbwbNzsa74-OvI39eK4qs6Y6X1UY6ddH6WQ_gZObSxD_JGl_Xji-6TRHKn05iqsCmd8nXA/exec"; 
    
    let baseInsumos = [];
    let baseRecetas = [];
    let chart;

    window.onload = cargarTodo;

    async function cargarTodo() {
        document.getElementById('loading').style.display = 'block';
        try {
            const res = await fetch(URL_GOOGLE);
            const data = await res.json();
            baseInsumos = data.insumos; // Ya viene filtrado por el último precio desde el Script
            baseRecetas = data.recetas;
            renderizar();
        } catch(e) { alert("Error de conexión con Google Sheets"); }
        document.getElementById('loading').style.display = 'none';
    }

    function cambiarTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(event) event.currentTarget.classList.add('active');
    }

    async function enviarInsumo() {
        const d = {
            nom: document.getElementById('ingNom').value,
            cat: document.getElementById('ingCat').value,
            pre: document.getElementById('ingPre').value,
            mer: document.getElementById('ingMerma').value,
            uni: document.getElementById('ingUniCompra').value,
            esReceta: false
        };
        if(!d.nom || !d.pre) return alert("Completa nombre y precio");
        
        await fetch(URL_GOOGLE, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
        location.reload();
    }

    function nuevaFila(nombreInsumo = '', cantidad = '', tipo = 'gr') {
        const cont = document.getElementById('listaIngredientes');
        const opciones = baseInsumos.map(ing => `<option value="${ing[0]}" ${ing[0]==nombreInsumo?'selected':''}>${ing[0]}</option>`).join('');
        
        cont.insertAdjacentHTML('beforeend', `
            <div class="fila-receta">
                <select class="selI">${opciones}</select>
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <input type="number" class="cantI" value="${cantidad}" placeholder="Cant." style="flex:2">
                    <select class="tipoU" style="flex:1">
                        <option value="gr" ${tipo=='gr'?'selected':''}>gr/ml</option>
                        <option value="un" ${tipo=='un'?'selected':''}>Unidad</option>
                    </select>
                </div>
            </div>`);
    }

    async function guardarReceta() {
        const nom = document.getElementById('platoNom').value;
        const sels = document.querySelectorAll('.selI');
        const cants = document.querySelectorAll('.cantI');
        const tipos = document.querySelectorAll('.tipoU');
        
        let listaIng = [];
        sels.forEach((s, i) => {
            listaIng.push({ nombreInsumo: s.value, cantidad: cants[i].value, tipo: tipos[i].value });
        });

        if(!nom || listaIng.length === 0) return alert("Falta nombre o ingredientes");

        await fetch(URL_GOOGLE, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ nombre: nom, ingredientes: listaIng, esReceta: true }) 
        });
        location.reload();
    }

    async function eliminarFila(tipo, index) {
        if(!confirm("¿Eliminar permanentemente?")) return;
        const sheet = (tipo === 'insumo') ? "Insumos" : "Recetas";
        await fetch(URL_GOOGLE, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ action: "delete", sheet: sheet, row: index }) 
        });
        location.reload();
    }

    function renderizar() {
        // Render Insumos
        const tI = document.querySelector('#tablaInventario tbody');
        tI.innerHTML = baseInsumos.map((i, idx) => `
            <tr>
                <td>${i[0]}<br><small>${i[1]}</small></td>
                <td>$${Number(i[2]).toLocaleString()}</td>
                <td>
                    <button class="btn-acc btn-edit" onclick="editarIng(${idx})">E</button>
                    <button class="btn-acc btn-del" onclick="eliminarFila('insumo', ${idx})">X</button>
                </td>
            </tr>`).join('');

        // Render Recetas con cálculo vivo
        const tR = document.querySelector('#tablaPlatos tbody');
        const platosCalc = baseRecetas.map((r, idx) => {
            let costo = 0;
            const ingrs = JSON.parse(r[1]);
            ingrs.forEach(ing => {
                const vivo = baseInsumos.find(b => b[0] === ing.nombreInsumo);
                if(vivo) {
                    const pReal = vivo[2] / (1 - (vivo[3]/100));
                    costo += (ing.tipo === 'gr') ? (pReal/1000)*ing.cantidad : pReal*ing.cantidad;
                }
            });
            return { nombre: r[0], costo: Math.round(costo), idx: idx, estructura: ingrs };
        });

        tR.innerHTML = platosCalc.map(p => `
            <tr>
                <td>${p.nombre}</td>
                <td>$${p.costo.toLocaleString()}</td>
                <td>
                    <button class="btn-acc btn-edit" onclick="editarPlato(${p.idx})">E</button>
                    <button class="btn-acc btn-del" onclick="eliminarFila('receta', ${p.idx})">X</button>
                </td>
            </tr>`).join('');
        
        dibujar(platosCalc);
    }

    function editarIng(idx) {
        const i = baseInsumos[idx];
        document.getElementById('ingNom').value = i[0];
        document.getElementById('ingCat').value = i[1];
        document.getElementById('ingPre').value = i[2];
        document.getElementById('ingMerma').value = i[3];
        document.getElementById('ingUniCompra').value = i[4];
        cambiarTab('registro');
    }

    function editarPlato(idx) {
        const p = baseRecetas[idx];
        document.getElementById('platoNom').value = p[0];
        document.getElementById('listaIngredientes').innerHTML = '';
        JSON.parse(p[1]).forEach(ing => nuevaFila(ing.nombreInsumo, ing.cantidad, ing.tipo));
        cambiarTab('recetas');
    }

    function dibujar(datos) {
        const ctx = document.getElementById('miGrafico').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, { 
            type:'bar', 
            data: { labels: datos.map(p=>p.nombre), datasets:[{label:'Costo $', data:datos.map(p=>p.costo), backgroundColor:'#d4a373'}] },
            options: { indexAxis: 'y', responsive:true, maintainAspectRatio:false }
        });
    }
</script>
</body>
</html>
