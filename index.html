<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema La Pasarela</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --secondary: #d4a373; --bg: #f4f7f6; --text: #333; --accent: #27ae60; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #ddd; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.8rem; min-width: 110px; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin: 0 0 15px 0; font-size: 1.1rem; color: var(--primary); border-bottom: 2px solid var(--secondary); display: inline-block; }
        label { display: block; font-size: 0.8rem; font-weight: bold; color: #666; margin-top: 10px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0 10px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; font-size: 15px; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .borrar-btn { background: #e74c3c; width: auto; padding: 5px 10px; font-size: 11px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
        th { background: #f8f8f8; }
        .fila-receta { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--secondary); }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('registro')">1. Insumos</button>
        <button class="tab-btn" onclick="openTab('recetas')">2. Recetas</button>
        <button class="tab-btn" onclick="openTab('inventario')">3. Inventario</button>
        <button class="tab-btn" onclick="openTab('resumen')">4. Consolidado</button>
    </div>

    <div id="registro" class="tab-content active">
        <div class="card">
            <h2 id="tituloInsumo">Registrar Insumo</h2>
            <input type="text" id="ingNom" placeholder="Nombre (ej: Salmón)">
            <label>Unidad de Compra</label>
            <select id="ingUniCompra">
                <option value="kg">Kilo</option>
                <option value="lt">Litro</option>
                <option value="un">Unidad</option>
            </select>
            <label>Precio de Compra</label>
            <input type="number" id="ingPre" placeholder="Precio total de la unidad">
            <label>% Merma (Desperdicio)</label>
            <input type="number" id="ingMerma" value="0">
            <button onclick="guardarIngrediente()" id="btnGuardarIng">GUARDAR Y SINCRONIZAR</button>
        </div>
    </div>

    <div id="recetas" class="tab-content">
        <div class="card">
            <h2>Nueva Receta</h2>
            <input type="text" id="platoNom" placeholder="Nombre del Plato">
            <label>Categoría</label>
            <select id="platoCat">
                <option value="Hamburguesa/Sandwich">Hamburguesa / Sandwich</option>
                <option value="Fondo">Plato de Fondo</option>
                <option value="Aperitivo">Aperitivo / Piqueo</option>
                <option value="Bebida">Bebida / Trago</option>
            </select>
            <div id="contenedorIngredientesReceta"></div>
            <button onclick="agregarFilaIngrediente()" style="background:var(--secondary)">+ AÑADIR INGREDIENTE</button>
            <button onclick="guardarPlato()" style="background:var(--accent); margin-top:10px;">CALCULAR Y GUARDAR PLATO</button>
        </div>
    </div>

    <div id="inventario" class="tab-content">
        <div class="card">
            <h2>Inventario en la Nube</h2>
            <table id="tablaGralInventario">
                <thead><tr><th>Nombre</th><th>Unidad</th><th>Precio</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="resumen" class="tab-content">
        <div class="card">
            <h2>Costos de Platos</h2>
            <div style="height:300px;"><canvas id="graficoCostos"></canvas></div>
            <table id="tablaPlatosConsolidado">
                <thead><tr><th>Plato</th><th>Costo Unit.</th><th>Acción</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

<script>
    // === CONFIGURACIÓN ===
    const MI_URL_DE_GOOGLE = "https://script.google.com/macros/s/AKfycbzRLGnM-3FGugmyiyH__YxblnfpTpljKcbD0HAx6Geu_2wu2LvNXGPNc6aspVbN1O3P/exec"; 

    let ingredientes = [];
    let platos = JSON.parse(localStorage.getItem('platos')) || [];
    let chart;

    async function cargarDesdeNube() {
        try {
            const respuesta = await fetch(MI_URL_DE_GOOGLE);
            const filas = await respuesta.json();
            // Mapeamos los datos de Google: Nombre, Categoría, Precio, Merma, Unidad
            ingredientes = filas.map(f => ({ nom: f[0], cat: f[1], pre: f[2], mer: f[3], uni: f[4] || 'kg' }));
            renderInventario();
            renderResumenConsolidado();
        } catch (e) { console.log("Error de conexión"); }
    }

    async function guardarIngrediente() {
        const data = {
            nom: document.getElementById('ingNom').value,
            cat: "Insumo", // Categoría genérica
            pre: document.getElementById('ingPre').value,
            mer: document.getElementById('ingMerma').value,
            uni: document.getElementById('ingUniCompra').value // Enviamos la unidad
        };
        if(!data.nom || !data.pre) return alert("Faltan datos");

        document.getElementById('btnGuardarIng').innerText = "ENVIANDO...";
        await fetch(MI_URL_DE_GOOGLE, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        
        alert("¡Guardado exitoso!");
        location.reload();
    }

    function openTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        if (event) event.currentTarget.classList.add('active');
    }

    function renderInventario() {
        const tbody = document.querySelector('#tablaGralInventario tbody');
        tbody.innerHTML = ingredientes.map(ing => `<tr><td>${ing.nom}</td><td>${ing.uni}</td><td>$${ing.pre}</td></tr>`).join('');
    }
