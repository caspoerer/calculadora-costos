<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Pasarela - Gestión</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --secondary: #d4a373; --bg: #f4f7f6; --text: #333; --accent: #27ae60; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #ddd; border-radius: 8px; cursor: pointer; font-weight: bold; min-width: 100px; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin-top: 10px; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        .fila-receta { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--secondary); }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="cambiarTab('registro')">1. Insumos</button>
        <button class="tab-btn" onclick="cambiarTab('recetas')">2. Recetas</button>
        <button class="tab-btn" onclick="cambiarTab('inventario')">3. Inventario</button>
        <button class="tab-btn" onclick="cambiarTab('resumen')">4. Consolidado</button>
    </div>

    <div id="registro" class="tab-content active">
        <div class="card">
            <h2>Nuevo Insumo</h2>
            <input type="text" id="ingNom" placeholder="Nombre (ej: Vacuno)">
            <select id="ingCat">
                <option value="Proteína">Proteína</option>
                <option value="No Proteína">No Proteína / Otros</option>
            </select>
            <select id="ingUniCompra">
                <option value="kg">Kilo</option>
                <option value="lt">Litro</option>
                <option value="un">Unidad</option>
            </select>
            <input type="number" id="ingPre" placeholder="Precio Compra">
            <input type="number" id="ingMerma" value="0" placeholder="% Merma">
            <button onclick="enviarInsumo()">GUARDAR EN LA NUBE</button>
        </div>
    </div>

    <div id="recetas" class="tab-content">
        <div class="card">
            <h2>Nueva Receta</h2>
            <input type="text" id="platoNom" placeholder="Nombre del Plato">
            <div id="listaIngredientes"></div>
            <button onclick="nuevaFila()" style="background:var(--secondary)">+ AGREGAR INSUMO</button>
            <button onclick="guardarReceta()" style="background:var(--accent); margin-top:10px;">FINALIZAR PLATO</button>
        </div>
    </div>

    <div id="inventario" class="tab-content">
        <div class="card">
            <h2>Inventario Nube</h2>
            <table id="tablaInventario">
                <thead><tr><th>Insumo</th><th>Tipo</th><th>Precio</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="resumen" class="tab-content">
        <div class="card">
            <h2>Costos Totales</h2>
            <div style="height:250px;"><canvas id="miGrafico"></canvas></div>
            <table id="tablaPlatos">
                <thead><tr><th>Plato</th><th>Costo</th><th>Eliminar</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

<script>
    const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbzRLGnM-3FGugmyiyH__YxblnfpTpljKcbD0HAx6Geu_2wu2LvNXGPNc6aspVbN1O3P/exec"; 
    let baseInsumos = [];
    let misPlatos = JSON.parse(localStorage.getItem('pasarela_recetas')) || [];
    let chart;

    // --- FUNCION CRITICA: CAMBIAR PESTAÑAS ---
    function cambiarTab(id) {
        // Ocultar todo
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        // Mostrar lo seleccionado
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        
        if(id === 'inventario') mostrarInventario();
        if(id === 'resumen') mostrarResumen();
    }

    // --- CARGAR DATOS ---
    async function cargarDatos() {
        try {
            const res = await fetch(URL_GOOGLE);
            baseInsumos = await res.json();
            console.log("Datos cargados:", baseInsumos);
        } catch(e) { console.error("Error nube:", e); }
    }

    async function enviarInsumo() {
        const d = {
            nom: document.getElementById('ingNom').value,
            cat: document.getElementById('ingCat').value,
            pre: document.getElementById('ingPre').value,
            mer: document.getElementById('ingMerma').value,
            uni: document.getElementById('ingUniCompra').value
        };
        await fetch(URL_GOOGLE, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
        alert("Sincronizado con Google Sheets");
        location.reload();
    }

    function nuevaFila() {
        const cont = document.getElementById('listaIngredientes');
        const opciones = baseInsumos.map((ing, i) => `<option value="${i}">${ing[0]}</option>`).join('');
        cont.insertAdjacentHTML('beforeend', `
            <div class="fila-receta">
                <select class="selI">${opciones}</select>
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <input type="number" class="cantI" placeholder="Cantidad" style="flex:2">
                    <select class="tipoU" style="flex:1"><option value="gr">gr/ml</option><option value="un">Unidad</option></select>
                </div>
            </div>`);
    }

    function guardarReceta() {
        const nom = document.getElementById('platoNom').value;
        const sels = document.querySelectorAll('.selI');
        const cants = document.querySelectorAll('.cantI');
        const tipos = document.querySelectorAll('.tipoU');
        let costoTotal = 0;

        sels.forEach((s, i) => {
            const ing = baseInsumos[s.value];
            const pReal = ing[2] / (1 - (ing[3]/100));
            const c = parseFloat(cants[i].value || 0);
            costoTotal += (tipos[i].value === 'gr') ? (pReal/1000)*c : pReal*c;
        });

        misPlatos.push({ nombre: nom, costo: Math.round(costoTotal) });
        localStorage.setItem('pasarela_recetas', JSON.stringify(misPlatos));
        alert("Plato Guardado");
        location.reload();
    }

    function mostrarInventario() {
        const t = document.querySelector('#tablaInventario tbody');
        t.innerHTML = baseInsumos.map(i => `<tr><td>${i[0]}</td><td>${i[1]}</td><td>$${i[2]}</td></tr>`).join('');
    }

    function mostrarResumen() {
        const t = document.querySelector('#tablaPlatos tbody');
        t.innerHTML = misPlatos.map((p, i) => `<tr><td>${p.nombre}</td><td>$${p.costo}</td><td><button class="tab-btn" style="background:red; padding:4px" onclick="eliminar(${i})">X</button></td></tr>`).join('');
        dibujar();
    }

    function eliminar(i) {
        misPlatos.splice(i, 1);
        localStorage.setItem('pasarela_recetas', JSON.stringify(misPlatos));
        mostrarResumen();
    }

    function dibujar() {
        const ctx = document.getElementById('miGrafico').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, { type:'bar', data: { labels: misPlatos.map(p=>p.nombre), datasets:[{label:'Costo', data:misPlatos.map(p=>p.costo), backgroundColor:'#d4a373'}] }, options:{indexAxis:'y', responsive:true, maintainAspectRatio:false} });
    }

    window.onload = cargarDatos;
</script>
</body>
</html>
