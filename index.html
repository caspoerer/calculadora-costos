<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema La Pasarela - Gestión Total</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --secondary: #d4a373; --bg: #f4f7f6; --text: #333; --accent: #27ae60; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        
        /* Navegación */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #ddd; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.8rem; min-width: 110px; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Tarjetas y Formularios */
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin: 0 0 15px 0; font-size: 1.1rem; color: var(--primary); border-bottom: 2px solid var(--secondary); display: inline-block; }
        label { display: block; font-size: 0.8rem; font-weight: bold; color: #666; margin-top: 10px; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0 10px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; font-size: 15px; }
        
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        .btn-secundario { background: var(--secondary); }
        .borrar-btn { background: #e74c3c; width: auto; padding: 5px 10px; font-size: 11px; }

        /* Tablas */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; background: white; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: #f8f8f8; color: var(--primary); }
        .fila-receta { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--secondary); }
        
        .status-nube { font-size: 0.7rem; color: var(--accent); font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('registro')">1. Insumos</button>
        <button class="tab-btn" onclick="openTab('recetas')">2. Recetas</button>
        <button class="tab-btn" onclick="openTab('inventario')">3. Inventario</button>
        <button class="tab-btn" onclick="openTab('resumen')">4. Consolidado</button>
    </div>

    <div id="registro" class="tab-content active">
        <div class="card">
            <h2>Registrar Nuevo Insumo</h2>
            <input type="text" id="ingNom" placeholder="Ej: Filete de Vacuno">
            
            <label>Tipo de Insumo</label>
            <select id="ingCat">
                <option value="Proteína">Proteína (Carnes/Pescados)</option>
                <option value="No Proteína">No Proteína (Vegetales/Otros)</option>
            </select>

            <label>Unidad de Compra</label>
            <select id="ingUniCompra">
                <option value="kg">Kilo (Kg)</option>
                <option value="lt">Litro (Lt)</option>
                <option value="un">Unidad (Un)</option>
            </select>

            <label>Precio de Compra ($)</label>
            <input type="number" id="ingPre" placeholder="Ej: 12000">

            <label>% Merma</label>
            <input type="number" id="ingMerma" value="0">

            <button onclick="guardarIngrediente()" id="btnGuardarIng">GUARDAR E IR A LA NUBE</button>
            <div id="msgCarga" class="status-nube" style="display:none;">Sincronizando con Google Sheets...</div>
        </div>
    </div>

    <div id="recetas" class="tab-content">
        <div class="card">
            <h2>Crear Receta</h2>
            <input type="text" id="platoNom" placeholder="Nombre del Plato">
            
            <label>Categoría del Plato</label>
            <select id="platoCat">
                <option value="Hamburguesa/Sandwich">Hamburguesa / Sandwich</option>
                <option value="Fondo">Plato de Fondo</option>
                <option value="Aperitivo">Aperitivo / Piqueo</option>
            </select>

            <div id="contenedorIngredientesReceta">
                </div>
            
            <button onclick="agregarFilaIngrediente()" class="btn-secundario">+ AÑADIR INSUMO A RECETA</button>
            <button onclick="guardarPlato()" style="background:var(--accent); margin-top:10px;">GUARDAR RECETA FINAL</button>
        </div>
    </div>

    <div id="inventario" class="tab-content">
        <div class="card">
            <h2>Insumos Sincronizados</h2>
            <p style="font-size: 0.7rem; color: #666;">* Datos traídos desde Google Sheets</p>
            <table id="tablaGralInventario">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Tipo</th>
                        <th>Precio</th>
                        <th>Unidad</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="resumen" class="tab-content">
        <div class="card">
            <h2>Análisis de Costos</h2>
            <div style="height:300px;"><canvas id="graficoCostos"></canvas></div>
            <table id="tablaPlatosConsolidado">
                <thead>
                    <tr>
                        <th>Plato</th>
                        <th>Costo Unit.</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

<script>
    // 🔗 CONFIGURACIÓN: PEGA TU LINK AQUÍ
    const MI_URL_DE_GOOGLE = "https://script.google.com/macros/s/AKfycbzRLGnM-3FGugmyiyH__YxblnfpTpljKcbD0HAx6Geu_2wu2LvNXGPNc6aspVbN1O3P/exec"; 

    let ingredientes = [];
    let platos = JSON.parse(localStorage.getItem('platos_pasarela')) || [];
    let chart;

    // Al cargar la página, traer datos de Google
    window.onload = async () => {
        await cargarDesdeNube();
        renderResumenConsolidado();
    };

    // Función para navegar entre pestañas
    function openTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        if(event) event.currentTarget.classList.add('active');
    }

    // --- LÓGICA DE INSUMOS (GOOGLE SHEETS) ---
    async function cargarDesdeNube() {
        try {
            const respuesta = await fetch(MI_URL_DE_GOOGLE);
            const datos = await respuesta.json();
            // Google Sheets nos da: [Nombre, Categoría, Precio, Merma, Unidad]
            ingredientes = datos.map(f => ({
                nom: f[0], cat: f[1], pre: parseFloat(f[2]), mer: parseFloat(f[3]), uni: f[4]
            }));
            renderInventario();
        } catch (e) {
            console.error("Error al conectar con la nube");
        }
    }

    async function guardarIngrediente() {
        const btn = document.getElementById('btnGuardarIng');
        const msg = document.getElementById('msgCarga');
        
        const data = {
            nom: document.getElementById('ingNom').value,
            cat: document.getElementById('ingCat').value,
            pre: document.getElementById('ingPre').value,
            mer: document.getElementById('ingMerma').value,
            uni: document.getElementById('ingUniCompra').value
        };

        if(!data.nom || !data.pre) return alert("Por favor completa los datos básicos");

        btn.disabled = true;
        msg.style.display = "block";

        await fetch(MI_URL_DE_GOOGLE, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(data)
        });

        alert("¡Enviado a la nube! Se actualizará en unos segundos.");
        location.reload();
    }

    function renderInventario() {
        const tbody = document.querySelector('#tablaGralInventario tbody');
        tbody.innerHTML = ingredientes.map(i => `
            <tr>
                <td>${i.nom}</td>
                <td><small>${i.cat}</small></td>
                <td>$${i.pre.toLocaleString()}</td>
                <td>${i.uni}</td>
            </tr>
        `).join('');
    }

    // --- LÓGICA DE RECETAS (LOCALSTORAGE PARA PERSISTENCIA) ---
    function agregarFilaIngrediente() {
        const div = document.getElementById('contenedorIngredientesReceta');
        const ops = ingredientes.map((ing, i) => `<option value="${i}">${ing.nom} (${ing.uni})</option>`).join('');
        
        const html = `
            <div class="fila-receta">
                <select class="selIng">${ops}</select>
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <input type="number" class="cantIng" placeholder="Cantidad" style="flex:2">
                    <select class="uniUso" style="flex:1">
                        <option value="menor">gr / ml</option>
                        <option value="entera">Unidad</option>
                    </select>
                </div>
            </div>`;
        div.insertAdjacentHTML('beforeend', html);
    }

    function guardarPlato() {
        const nomPlato = document.getElementById('platoNom').value;
        const catPlato = document.getElementById('platoCat').value;
        const sels = document.querySelectorAll('.selIng');
        const cants = document.querySelectorAll('.cantIng');
        const unis = document.querySelectorAll('.uniUso');

        if(!nomPlato || sels.length === 0) return alert("Falta nombre o ingredientes");

        let costoAcumulado = 0;

        sels.forEach((sel, i) => {
            const ing = ingredientes[sel.value];
            const cant = parseFloat(cants[i].value || 0);
            const tipo = unis[i].value;

            // Precio con merma: Precio / (1 - %)
            let precioEfectivo = ing.pre / (1 - (ing.mer/100));

            if (tipo === "menor" && (ing.uni === "kg" || ing.uni === "lt")) {
                costoAcumulado += (precioEfectivo / 1000) * cant;
            } else {
                costoAcumulado += precioEfectivo * cant;
            }
        });

        platos.push({
            nombre: nomPlato,
            categoria: catPlato,
            costo: Math.round(costoAcumulado)
        });

        localStorage.setItem('platos_pasarela', JSON.stringify(platos));
        alert("¡Receta guardada!");
        location.reload();
    }

    function renderResumenConsolidado() {
        const tbody = document.querySelector('#tablaPlatosConsolidado tbody');
        tbody.innerHTML = platos.map((p, i) => `
            <tr>
                <td>${p.nombre}<br><small>${p.categoria}</small></td>
                <td>$${p.costo.toLocaleString()}</td>
                <td><button class="borrar-btn" onclick="eliminarPlato(${i})">X</button></td>
            </tr>
        `).join('');
        actualizarGrafico();
    }

    function eliminarPlato(i) {
        if(confirm("¿Eliminar esta receta?")) {
            platos.splice(i, 1);
            localStorage.setItem('platos_pasarela', JSON.stringify(platos));
            renderResumenConsolidado();
        }
    }

    function actualizarGrafico() {
        const ctx = document.getElementById('graficoCostos').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: platos.map(p => p.nombre),
                datasets: [{
                    label: 'Costo Unitario ($)',
                    data: platos.map(p => p.costo),
                    backgroundColor: '#d4a373'
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false
            }
        });
    }
</script>
</body>
</html>
