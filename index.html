<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Pasarela - Gestión Integral</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { 
            --primary: #2c3e50; --secondary: #d4a373; --bg: #f4f7f6; --text: #333; 
            --accent: #e74c3c; --success: #27ae60; --info: #3498db;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; padding-bottom: 60px; color: var(--text); }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; position: sticky; top: 0; background: var(--bg); z-index: 10; padding: 5px 0; overflow-x: auto; }
        .tab-btn { padding: 10px 15px; border: none; background: #ddd; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.7rem; white-space: nowrap; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h2, h3 { color: var(--primary); margin-top: 0; }
        
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; font-size: 14px; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        
        .btn-xl { background: #1d6f42; margin-bottom: 15px; }
        .btn-edit { background: var(--info); width: auto; padding: 5px 10px; font-size: 11px; margin-right: 5px; }
        .btn-del { background: var(--accent); width: auto; padding: 5px 10px; font-size: 11px; }

        .busqueda { border: 2px solid var(--secondary); background: #fff; }

        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: #f8f8f8; position: sticky; top: 0; }

        .detalle-box { background: #fefae0; padding: 10px; border-radius: 8px; margin: 5px 0; font-size: 0.75rem; border-left: 3px solid var(--secondary); }
        .loader { text-align: center; padding: 20px; font-weight: bold; color: var(--secondary); }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="cambiarTab('registro')">Nuevo Insumo</button>
        <button class="tab-btn" onclick="cambiarTab('inventario')">Inventario Pro</button>
        <button class="tab-btn" onclick="cambiarTab('recetas')">Crear Receta</button>
        <button class="tab-btn" onclick="cambiarTab('resumen')">Consolidado</button>
    </div>

    <div id="loading" class="loader" style="display:none;">Sincronizando La Pasarela...</div>

    <div id="registro" class="tab-content active">
        <div class="card">
            <h2 id="tituloIng">Configurar Insumo</h2>
            <p style="font-size: 0.8rem; color: #666;">Si el insumo ya existe, se guardará como un nuevo precio histórico.</p>
            <input type="text" id="ingNom" placeholder="Nombre (ej: Filete de Vacuno)">
            <input type="number" id="ingPre" placeholder="Precio Compra ($)">
            <input type="number" id="ingMerma" value="0" placeholder="% Merma">
            <select id="ingUniCompra">
                <option value="kg">Kilo / Litro</option>
                <option value="un">Unidad</option>
            </select>
            <button onclick="enviarInsumo()">GUARDAR / ACTUALIZAR PRECIO</button>
        </div>
    </div>

    <div id="inventario" class="tab-content">
        <div class="card">
            <h2>Gestión de Inventario</h2>
            <input type="text" id="searchInsumo" class="busqueda" placeholder="🔍 Buscar ingrediente..." onkeyup="filtrarInsumos()">
            <div style="max-height: 400px; overflow-y: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Insumo</th>
                            <th>Precio Actual</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaInsumos"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="recetas" class="tab-content">
        <div class="card">
            <h2>Diseño de Receta</h2>
            <input type="text" id="platoNom" placeholder="Nombre del Plato">
            <select id="platoTipo">
                <option value="Entrada">Entrada</option>
                <option value="Hamburguesa/Sandwich">Hamburguesa/Sandwich</option>
                <option value="Plato de Fondo">Plato de Fondo</option>
                <option value="Ensalada">Ensalada</option>
                <option value="Postre">Postre</option>
                <option value="Bebestible con Alcohol">Bebestible con Alcohol</option>
                <option value="Bebestible sin Alcohol">Bebestible sin Alcohol</option>
            </select>
            <div id="listaIngredientes"></div>
            <button onclick="nuevaFila()" style="background:var(--secondary)">+ AÑADIR INGREDIENTE</button>
            <button onclick="guardarReceta()" style="background:var(--success); margin-top:10px;">GUARDAR PLATO</button>
        </div>
    </div>

    <div id="resumen" class="tab-content">
        <button onclick="exportarExcel()" class="btn-xl">📊 EXPORTAR COSTOS A EXCEL</button>
        <div class="card" style="height:250px;">
            <canvas id="graficoCostos"></canvas>
        </div>
        <div id="contenedorCartas"></div>
    </div>

<script>
    const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbwZSRn5i1s0O8TyeNlqrBixBLvr5a-pDzaeRstVhGoBKLbydZ1CI341BSZ_1yWh3qHFDg/exec"; 
    let baseInsumos = [];
    let baseRecetas = [];
    let chart;

    const COLORES_CAT = {
        "Entrada": "#ffadad",
        "Hamburguesa/Sandwich": "#ffd6a5",
        "Plato de Fondo": "#fdffb6",
        "Ensalada": "#caffbf",
        "Postre": "#9bf6ff",
        "Bebestible con Alcohol": "#a0c4ff",
        "Bebestible sin Alcohol": "#bdb2ff"
    };

    window.onload = cargarTodo;

    async function cargarTodo() {
        document.getElementById('loading').style.display = 'block';
        try {
            const res = await fetch(URL_GOOGLE);
            const data = await res.json();
            baseInsumos = data.insumos;
            baseRecetas = data.recetas;
            renderizar();
        } catch(e) { console.error(e); }
        document.getElementById('loading').style.display = 'none';
    }

    function cambiarTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(event) event.currentTarget.classList.add('active');
    }

    function nuevaFila(nombre = '', cant = '', tipo = 'gr') {
        const cont = document.getElementById('listaIngredientes');
        const opciones = baseInsumos.map(i => `<option value="${i[0]}" ${i[0]==nombre?'selected':''}>${i[0]}</option>`).join('');
        cont.insertAdjacentHTML('beforeend', `
            <div class="fila-receta" style="display:flex; gap:5px; margin-bottom:5px; align-items:center;">
                <select class="selI" style="flex:2">${opciones}</select>
                <input type="number" class="cantI" value="${cant}" placeholder="Cant" style="flex:1">
                <select class="tipoU" style="flex:1">
                    <option value="gr" ${tipo=='gr'?'selected':''}>gr/ml</option>
                    <option value="un" ${tipo=='un'?'selected':''}>un</option>
                </select>
                <button onclick="this.parentElement.remove()" style="width:auto; background:none; color:red; padding:0 5px;">✕</button>
            </div>`);
    }

    async function enviarInsumo() {
        const d = {
            nom: document.getElementById('ingNom').value,
            cat: "General",
            pre: document.getElementById('ingPre').value,
            mer: document.getElementById('ingMerma').value,
            uni: document.getElementById('ingUniCompra').value,
            esReceta: false
        };
        if(!d.nom || !d.pre) return alert("Completa los datos");
        await fetch(URL_GOOGLE, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
        location.reload();
    }

    async function guardarReceta() {
        const nom = document.getElementById('platoNom').value;
        const tipo = document.getElementById('platoTipo').value;
        const sels = document.querySelectorAll('.selI');
        const cants = document.querySelectorAll('.cantI');
        const tipos = document.querySelectorAll('.tipoU');
        let lista = [];
        sels.forEach((s, i) => { if(cants[i].value) lista.push({ nombreInsumo: s.value, cantidad: cants[i].value, tipo: tipos[i].value }); });
        
        if(!nom || lista.length === 0) return alert("Faltan datos en la receta");

        await fetch(URL_GOOGLE, { 
            method: 'POST', mode: 'no-cors', 
            body: JSON.stringify({ nombre: nom, tipoPlato: tipo, ingredientes: lista, esReceta: true }) 
        });
        location.reload();
    }

    async function eliminarItem(tipo, index) {
        if(!confirm("¿Deseas eliminar este registro de forma permanente?")) return;
        const sheet = (tipo === 'insumo') ? "Insumos" : "Recetas";
        await fetch(URL_GOOGLE, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "delete", sheet: sheet, row: index }) });
        location.reload();
    }

    function editarInsumo(idx) {
        const i = baseInsumos[idx];
        document.getElementById('ingNom').value = i[0];
        document.getElementById('ingPre').value = i[2];
        document.getElementById('ingMerma').value = i[3];
        document.getElementById('ingUniCompra').value = i[4];
        cambiarTab('registro');
    }

    function filtrarInsumos() {
        const val = document.getElementById('searchInsumo').value.toLowerCase();
        const filas = document.querySelectorAll('#tablaInsumos tr');
        filas.forEach(f => f.style.display = f.innerText.toLowerCase().includes(val) ? '' : 'none');
    }

    function renderizar() {
        // Pestaña Inventario Pro
        const tI = document.getElementById('tablaInsumos');
        tI.innerHTML = baseInsumos.map((i, idx) => `
            <tr>
                <td><strong>${i[0]}</strong><br><small>Merma: ${i[3]}%</small></td>
                <td>$${Number(i[2]).toLocaleString()}</td>
                <td>
                    <button class="btn-edit" onclick="editarInsumo(${idx})">EDITAR</button>
                    <button class="btn-del" onclick="eliminarItem('insumo', ${idx})">BORRAR</button>
                </td>
            </tr>`).join('');

        // Pestaña Consolidado
        const cont = document.getElementById('contenedorCartas');
        cont.innerHTML = '';
        let datosGrafico = [];

        Object.keys(COLORES_CAT).forEach(cat => {
            const platos = baseRecetas.filter(r => r[2] === cat);
            if(platos.length === 0) return;

            let catHtml = `<div class="card" style="border-top: 5px solid ${COLORES_CAT[cat]}"><h3>${cat}</h3>`;
            platos.forEach((r) => {
                let costoTotal = 0;
                let ingHtml = '';
                const ingrs = JSON.parse(r[1]);

                ingrs.forEach(ing => {
                    const vivo = baseInsumos.find(b => b[0] === ing.nombreInsumo);
                    let sub = 0;
                    if(vivo) {
                        const pReal = vivo[2] / (1 - (vivo[3]/100));
                        sub = (ing.tipo === 'gr') ? (pReal/1000)*ing.cantidad : pReal*ing.cantidad;
                        costoTotal += sub;
                    }
                    ingHtml += `<div>• ${ing.nombreInsumo}: ${ing.cantidad}${ing.tipo} ($${Math.round(sub)})</div>`;
                });

                const idxReal = baseRecetas.findIndex(br => br[0] === r[0] && br[1] === r[1]);

                catHtml += `
                    <div style="display:flex; justify-content:space-between; align-items:start; padding:15px 0; border-bottom:1px solid #eee;">
                        <div style="flex:2">
                            <span style="font-size:1.1rem; font-weight:bold;">${r[0]}</span> 
                            <span style="color:var(--success); font-weight:bold; margin-left:10px;">$${Math.round(costoTotal).toLocaleString()}</span>
                            <div class="detalle-box">${ingHtml}</div>
                        </div>
                        <div style="flex:1; text-align:right;">
                            <button class="btn-edit" onclick="editarReceta(${idxReal})">E</button>
                            <button class="btn-del" onclick="eliminarItem('receta', ${idxReal})">X</button>
                        </div>
                    </div>`;
                
                datosGrafico.push({ nombre: r[0], costo: Math.round(costoTotal), color: COLORES_CAT[cat] });
            });
            cont.insertAdjacentHTML('beforeend', catHtml + `</div>`);
        });

        dibujar(datosGrafico);
    }

    function editarReceta(idx) {
        const r = baseRecetas[idx];
        document.getElementById('platoNom').value = r[0];
        document.getElementById('platoTipo').value = r[2];
        document.getElementById('listaIngredientes').innerHTML = '';
        JSON.parse(r[1]).forEach(ing => nuevaFila(ing.nombreInsumo, ing.cantidad, ing.tipo));
        cambiarTab('recetas');
    }

    function dibujar(datos) {
        const ctx = document.getElementById('graficoCostos').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: datos.map(d => d.nombre),
                datasets: [{
                    label: 'Costo de Producción ($)',
                    data: datos.map(d => d.costo),
                    backgroundColor: datos.map(d => d.color)
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y' }
        });
    }

    function exportarExcel() {
        let rows = [["Categoría", "Plato", "Ingrediente", "Cantidad", "Unidad", "Costo Subtotal"]];
        baseRecetas.forEach(r => {
            const ingrs = JSON.parse(r[1]);
            ingrs.forEach(ing => {
                const vivo = baseInsumos.find(b => b[0] === ing.nombreInsumo);
                let sub = 0;
                if(vivo) {
                    const pReal = vivo[2] / (1 - (vivo[3]/100));
                    sub = (ing.tipo === 'gr') ? (pReal/1000)*ing.cantidad : pReal*ing.cantidad;
                }
                rows.push([r[2], r[0], ing.nombreInsumo, ing.cantidad, ing.tipo, Math.round(sub)]);
            });
        });
        const ws = XLSX.utils.aoa_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Costos La Pasarela");
        XLSX.writeFile(wb, "Analisis_Costos_LaPasarela.xlsx");
    }
</script>
</body>
</html>
