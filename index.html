<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema La Pasarela</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --secondary: #d4a373; --bg: #f4f7f6; --text: #333; --accent: #27ae60; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #ddd; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.8rem; min-width: 110px; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin: 0 0 15px 0; font-size: 1.1rem; color: var(--primary); border-bottom: 2px solid var(--secondary); display: inline-block; }
        label { display: block; font-size: 0.8rem; font-weight: bold; color: #666; margin-top: 10px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0 10px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; font-size: 15px; }
        
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-edit { background: #3498db; width: auto; padding: 5px 10px; font-size: 11px; margin-right: 5px; }
        .borrar-btn { background: #e74c3c; width: auto; padding: 5px 10px; font-size: 11px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
        th { background: #f8f8f8; }
        .fila-receta { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--secondary); }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('registro')">1. Insumos</button>
        <button class="tab-btn" onclick="openTab('recetas')">2. Recetas</button>
        <button class="tab-btn" onclick="openTab('inventario')">3. Inventario</button>
        <button class="tab-btn" onclick="openTab('resumen')">4. Consolidado</button>
    </div>

    <div id="registro" class="tab-content active">
        <div class="card">
            <h2 id="tituloInsumo">Registrar Insumo</h2>
            <input type="hidden" id="editIngIndex" value="-1">
            <label>Nombre del Insumo</label>
            <input type="text" id="ingNom">
            <label>Categoría</label>
            <select id="ingCat">
                <option value="Animal">Proteína Animal</option>
                <option value="Tierra">De la Tierra / Vegetal</option>
            </select>
            <label>Unidad Base</label>
            <select id="ingUniBase">
                <option value="kg">Kilo</option>
                <option value="lt">Litro</option>
                <option value="un">Unidad</option>
            </select>
            <label>Precio de Compra</label>
            <input type="number" id="ingPre">
            <label>% Merma</label>
            <input type="number" id="ingMerma" value="0">
            <button onclick="guardarIngrediente()" id="btnGuardarIng">GUARDAR INSUMO</button>
            <button onclick="cancelarEditIng()" id="btnCancelIng" style="display:none; background:#95a5a6;">CANCELAR EDICIÓN</button>
        </div>
    </div>

    <div id="recetas" class="tab-content">
        <div class="card">
            <h2 id="tituloReceta">Nueva Receta</h2>
            <input type="hidden" id="editPlatoIndex" value="-1">
            <label>Nombre del Plato</label>
            <input type="text" id="platoNom">
            <label>Categoría del Plato</label>
            <select id="platoCat">
                <option value="Hamburguesa/Sandwich">Hamburguesa / Sandwich</option>
                <option value="Fondo">Plato de Fondo</option>
                <option value="Aperitivo">Aperitivo / Piqueo</option>
                <option value="Bebida">Bebida</option>
                <option value="Alcohol">Alcohol / Trago</option>
            </select>
            <div id="contenedorIngredientesReceta"></div>
            <button onclick="agregarFilaIngrediente()" style="background:var(--secondary)">+ AÑADIR INGREDIENTE</button>
            <button onclick="guardarPlato()" style="background:var(--accent); margin-top:10px;">GUARDAR PLATO</button>
            <button onclick="cancelarEditPlato()" id="btnCancelPlato" style="display:none; background:#95a5a6; margin-top:5px;">CANCELAR EDICIÓN</button>
        </div>
    </div>

    <div id="inventario" class="tab-content">
        <div class="card">
            <h2>Inventario de Insumos</h2>
            <table id="tablaGralInventario">
                <thead><tr><th>Nombre</th><th>Cat.</th><th>Precio</th><th>Acción</th></tr></thead>
                <tbody></tbody>
            </table>
            <button class="btn-edit" onclick="exportarInventarioExcel()" style="background:var(--accent); width:100%; margin-top:15px;">DESCARGAR EXCEL</button>
        </div>
    </div>

    <div id="resumen" class="tab-content">
        <div class="card">
            <h2>Consolidado de Platos</h2>
            <div style="height:350px;"><canvas id="graficoCostos"></canvas></div>
            <table id="tablaPlatosConsolidado">
                <thead><tr><th>Plato</th><th>Categoría</th><th>Costo</th><th>Acción</th></tr></thead>
                <tbody></tbody>
            </table>
            <button onclick="exportarCostosExcel()" style="background:var(--accent); width:100%; margin-top:15px;">DESCARGAR RESUMEN EXCEL</button>
        </div>
    </div>

<script>
    let ingredientes = JSON.parse(localStorage.getItem('ingredientes')) || [];
    let platos = JSON.parse(localStorage.getItem('platos')) || [];
    let chart;

    const coloresCat = {
        "Fondo": "#e74c3c",
        "Aperitivo": "#f1c40f",
        "Hamburguesa/Sandwich": "#d4a373",
        "Alcohol": "#9b59b6",
        "Bebida": "#3498db"
    };

    function openTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        if(tabId === 'inventario') renderInventario();
        if(tabId === 'resumen') renderResumenConsolidado();
    }

    // --- LÓGICA INGREDIENTES ---
    function guardarIngrediente() {
        const idx = parseInt(document.getElementById('editIngIndex').value);
        const data = {
            nom: document.getElementById('ingNom').value,
            cat: document.getElementById('ingCat').value,
            uni: document.getElementById('ingUniBase').value,
            pre: parseFloat(document.getElementById('ingPre').value),
            mer: parseFloat(document.getElementById('ingMerma').value)
        };

        if(!data.nom || isNaN(data.pre)) return alert("Completa los datos");

        if(idx === -1) ingredientes.push(data);
        else ingredientes[idx] = data;

        localStorage.setItem('ingredientes', JSON.stringify(ingredientes));
        location.reload();
    }

    function editarIng(i) {
        const ing = ingredientes[i];
        document.getElementById('editIngIndex').value = i;
        document.getElementById('ingNom').value = ing.nom;
        document.getElementById('ingCat').value = ing.cat;
        document.getElementById('ingUniBase').value = ing.uni;
        document.getElementById('ingPre').value = ing.pre;
        document.getElementById('ingMerma').value = ing.mer;
        document.getElementById('tituloInsumo').innerText = "Editando Insumo";
        document.getElementById('btnCancelIng').style.display = "block";
        openTab('registro');
    }

    function borrarIng(i) { if(confirm("¿Borrar insumo?")) { ingredientes.splice(i,1); localStorage.setItem('ingredientes', JSON.stringify(ingredientes)); renderInventario(); } }

    function renderInventario() {
        const tbody = document.querySelector('#tablaGralInventario tbody');
        tbody.innerHTML = ingredientes.map((ing, i) => `
            <tr>
                <td>${ing.nom}</td>
                <td>${ing.cat}</td>
                <td>$${ing.pre}</td>
                <td>
                    <button class="btn-edit" onclick="editarIng(${i})">Edit</button>
                    <button class="borrar-btn" onclick="borrarIng(${i})">X</button>
                </td>
            </tr>
        `).join('');
    }

    // --- LÓGICA RECETAS ---
    function agregarFilaIngrediente(ingIdx = 0, cant = "", uni = "base") {
        const div = document.getElementById('contenedorIngredientesReceta');
        const ops = ingredientes.map((ing, i) => `<option value="${i}" ${i==ingIdx?'selected':''}>${ing.nom}</option>`).join('');
        const html = `
            <div class="fila-receta" style="display:flex; gap:5px;">
                <select class="selIng" style="flex:2">${ops}</select>
                <input type="number" class="cantIng" value="${cant}" placeholder="Cant." style="flex:1">
                <select class="uniUso" style="flex:1">
                    <option value="base" ${uni=='base'?'selected':''}>Unidad</option>
                    <option value="gr" ${uni=='gr'?'selected':''}>gr/ml</option>
                </select>
            </div>`;
        div.insertAdjacentHTML('beforeend', html);
    }

    function guardarPlato() {
        const idx = parseInt(document.getElementById('editPlatoIndex').value);
        const sels = document.querySelectorAll('.selIng');
        const cants = document.querySelectorAll('.cantIng');
        const unis = document.querySelectorAll('.uniUso');
        
        let costoTotal = 0;
        let items = [];

        sels.forEach((sel, i) => {
            const ing = ingredientes[sel.value];
            const cantVal = parseFloat(cants[i].value);
            const uniVal = unis[i].value;
            let pReal = ing.pre / (1 - (ing.mer/100));
            if(uniVal === 'gr') pReal /= 1000;
            costoTotal += pReal * cantVal;
            items.push({ ingIdx: sel.value, cant: cantVal, uni: uniVal });
        });

        const dataPlato = {
            nombre: document.getElementById('platoNom').value,
            categoria: document.getElementById('platoCat').value,
            costo: Math.round(costoTotal),
            ingredientes: items
        };

        if(idx === -1) platos.push(dataPlato);
        else platos[idx] = dataPlato;

        localStorage.setItem('platos', JSON.stringify(platos));
        location.reload();
    }

    function editarPlato(i) {
        const p = platos[i];
        document.getElementById('editPlatoIndex').value = i;
        document.getElementById('platoNom').value = p.nombre;
        document.getElementById('platoCat').value = p.categoria;
        document.getElementById('contenedorIngredientesReceta').innerHTML = "";
        p.ingredientes.forEach(item => agregarFilaIngrediente(item.ingIdx, item.cant, item.uni));
        document.getElementById('tituloReceta').innerText = "Editando Plato";
        document.getElementById('btnCancelPlato').style.display = "block";
        openTab('recetas');
    }

    function renderResumenConsolidado() {
        const tbody = document.querySelector('#tablaPlatosConsolidado tbody');
        tbody.innerHTML = platos.map((p, i) => `
            <tr>
                <td>${p.nombre}</td>
                <td>${p.categoria}</td>
                <td>$${p.costo.toLocaleString()}</td>
                <td>
                    <button class="btn-edit" onclick="editarPlato(${i})">Edit</button>
                    <button class="borrar-btn" onclick="borrarPlato(${i})">X</button>
                </td>
            </tr>
        `).join('');
        actualizarGrafico();
    }

    function borrarPlato(i) { if(confirm("¿Borrar plato?")) { platos.splice(i,1); localStorage.setItem('platos', JSON.stringify(platos)); renderResumenConsolidado(); } }

    function actualizarGrafico() {
        const ctx = document.getElementById('graficoCostos').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: platos.map(p => p.nombre),
                datasets: [{
                    label: 'Costo de Producción ($)',
                    data: platos.map(p => p.costo),
                    backgroundColor: platos.map(p => coloresCat[p.categoria] || '#999'),
                    indexAxis: 'y'
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { legend: { display: false } }
            }
        });
    }

    // EXCEL
    function descargarCSV(c, n) { const b = new Blob([c], {type:'text/csv;charset=utf-8;'}); const l = document.createElement("a"); l.href=URL.createObjectURL(b); l.setAttribute("download", n); l.click(); }
    function exportarInventarioExcel() { 
        let csv = "Nombre,Categoria,Unidad,Precio,Merma\n";
        ingredientes.forEach(i => csv += `${i.nom},${i.cat},${i.uni},${i.pre},${i.mer}\n`);
        descargarCSV(csv, "Inventario_Pasarela.csv");
    }
    function exportarCostosExcel() {
        let csv = "Plato,Categoria,Costo\n";
        platos.forEach(p => csv += `${p.nombre},${p.categoria},${p.costo}\n`);
        descargarCSV(csv, "Costos_Platos_Pasarela.csv");
    }

    renderResumenConsolidado();
</script>
</body>
</html>
