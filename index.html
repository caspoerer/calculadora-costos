<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión La Pasarela</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --secondary: #d4a373; --bg: #f4f7f6; --text: #333; --accent: #27ae60; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        
        /* Sistema de Pestañas */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #ddd; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.85rem; min-width: 100px; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin: 0 0 15px 0; font-size: 1.1rem; color: var(--primary); border-bottom: 2px solid var(--secondary); display: inline-block; }
        label { display: block; font-size: 0.8rem; font-weight: bold; color: #666; margin-top: 10px; }
        .ayuda { font-size: 0.7rem; color: #999; margin-bottom: 4px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0 10px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; font-size: 15px; }
        
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-excel { background: var(--accent); margin-top: 5px; }
        .borrar-btn { background: #e74c3c; width: auto; padding: 5px 10px; font-size: 11px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
        th { background: #f8f8f8; }
        .cat-badge { padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; color: white; }
        .animal { background: #e67e22; }
        .tierra { background: #27ae60; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('registro')">1. Registro</button>
        <button class="tab-btn" onclick="openTab('recetas')">2. Recetas</button>
        <button class="tab-btn" onclick="openTab('inventario')">3. Inventario</button>
        <button class="tab-btn" onclick="openTab('resumen')">4. Costos</button>
    </div>

    <div id="registro" class="tab-content active">
        <div class="card">
            <h2>Registrar Insumo</h2>
            <label>Nombre</label>
            <input type="text" id="ingNom" placeholder="Ej: Vacuno, Lechuga...">
            
            <label>Categoría</label>
            <select id="ingCat">
                <option value="Animal">Proteína Animal (Carne, Pescado, Lácteos)</option>
                <option value="Tierra">De la Tierra (Vegetales, Frutas, Harina)</option>
            </select>

            <label>Unidad de Compra</label>
            <select id="ingUniBase">
                <option value="kg">Kilo</option>
                <option value="lt">Litro</option>
                <option value="un">Unidad</option>
            </select>

            <label>Precio de Compra</label>
            <input type="number" id="ingPre" placeholder="Precio total pagado">
            
            <label>% Merma</label>
            <input type="number" id="ingMerma" value="0">
            
            <button onclick="guardarIngrediente()">GUARDAR INGREDIENTE</button>
        </div>
    </div>

    <div id="recetas" class="tab-content">
        <div class="card">
            <h2>Armar Nuevo Plato</h2>
            <input type="text" id="platoNom" placeholder="Nombre del Plato">
            <div id="contenedorIngredientesReceta"></div>
            <button onclick="agregarFilaIngrediente()" style="background:var(--secondary)">+ AÑADIR INSUMO</button>
            <button onclick="guardarPlato()" style="background:var(--accent); margin-top:10px;">CALCULAR Y GUARDAR</button>
        </div>
    </div>

    <div id="inventario" class="tab-content">
        <div class="card">
            <h2>Inventario de Insumos</h2>
            <button class="btn-excel" onclick="exportarInventarioExcel()">Descargar Inventario (Excel)</button>
            
            <h3>Proteína Animal</h3>
            <table id="tablaAnimal">
                <thead><tr><th>Insumo</th><th>Unidad</th><th>Precio</th></tr></thead>
                <tbody></tbody>
            </table>

            <h3 style="margin-top:20px;">De la Tierra</h3>
            <table id="tablaTierra">
                <thead><tr><th>Insumo</th><th>Unidad</th><th>Precio</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="resumen" class="tab-content">
        <div class="card">
            <h2>Resumen de Platos</h2>
            <button class="btn-excel" onclick="exportarCostosExcel()">Descargar Resumen Platos (Excel)</button>
            <table id="tablaPlatos">
                <thead><tr><th>Plato</th><th>Costo</th><th>Acción</th></tr></thead>
                <tbody></tbody>
            </table>
            <div style="height:200px; margin-top:20px;"><canvas id="graficoCostos"></canvas></div>
        </div>
    </div>

<script>
    let ingredientes = JSON.parse(localStorage.getItem('ingredientes')) || [];
    let platos = JSON.parse(localStorage.getItem('platos')) || [];
    let chart;

    function openTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        if(tabId === 'inventario') renderInventario();
        if(tabId === 'resumen') renderResumenPlatos();
    }

    function guardarIngrediente() {
        const nom = document.getElementById('ingNom').value;
        const cat = document.getElementById('ingCat').value;
        const pre = parseFloat(document.getElementById('ingPre').value);
        const uni = document.getElementById('ingUniBase').value;
        const mer = parseFloat(document.getElementById('ingMerma').value);
        if(nom && pre) {
            ingredientes.push({ nom, cat, pre, uni, mer });
            localStorage.setItem('ingredientes', JSON.stringify(ingredientes));
            alert("Guardado");
            location.reload();
        }
    }

    function renderInventario() {
        const tAnimal = document.querySelector('#tablaAnimal tbody');
        const tTierra = document.querySelector('#tablaTierra tbody');
        tAnimal.innerHTML = ''; tTierra.innerHTML = '';
        
        ingredientes.forEach(ing => {
            const html = `<tr><td>${ing.nom}</td><td>${ing.uni}</td><td>$${ing.pre}</td></tr>`;
            if(ing.cat === 'Animal') tAnimal.innerHTML += html;
            else tTierra.innerHTML += html;
        });
    }

    function agregarFilaIngrediente() {
        const div = document.getElementById('contenedorIngredientesReceta');
        const ops = ingredientes.map((ing, i) => `<option value="${i}">${ing.nom}</option>`).join('');
        const html = `<div style="display:flex; gap:5px; margin-bottom:5px;">
            <select class="selIng" style="flex:2">${ops}</select>
            <input type="number" class="cantIng" placeholder="Cant." style="flex:1">
            <select class="uniUso" style="flex:1"><option value="base">Base</option><option value="gr">gr/ml</option></select>
        </div>`;
        div.insertAdjacentHTML('beforeend', html);
    }

    function guardarPlato() {
        const nomPlato = document.getElementById('platoNom').value;
        const sels = document.querySelectorAll('.selIng');
        const cants = document.querySelectorAll('.cantIng');
        const unis = document.querySelectorAll('.uniUso');
        let costoTotal = 0;
        let detalleIngredientes = [];

        sels.forEach((sel, i) => {
            const ing = ingredientes[sel.value];
            let cant = parseFloat(cants[i].value);
            let precioReal = ing.pre / (1 - (ing.mer/100));
            if(unis[i].value === 'gr') precioReal = precioReal / 1000;
            costoTotal += precioReal * cant;
            detalleIngredientes.push(`${ing.nom} (${cant}${unis[i].value === 'gr' ? 'gr' : ing.uni})`);
        });

        platos.push({ nombre: nomPlato, costo: Math.round(costoTotal), detalle: detalleIngredientes.join(', ') });
        localStorage.setItem('platos', JSON.stringify(platos));
        alert("Plato Guardado");
        openTab('resumen');
    }

    function renderResumenPlatos() {
        const tbody = document.querySelector('#tablaPlatos tbody');
        tbody.innerHTML = platos.map((p, i) => `<tr><td>${p.nombre}</td><td>$${p.costo.toLocaleString()}</td><td><button onclick="borrarPlato(${i})" class="borrar-btn">X</button></td></tr>`).join('');
        actualizarGrafico();
    }

    function borrarPlato(i) { platos.splice(i, 1); localStorage.setItem('platos', JSON.stringify(platos)); renderResumenPlatos(); }

    // EXPORTAR A EXCEL (CSV)
    function exportarInventarioExcel() {
        let csv = "Categoria,Insumo,Unidad,Precio\n";
        ingredientes.forEach(i => csv += `${i.cat},${i.nom},${i.uni},${i.pre}\n`);
        descargarCSV(csv, "Inventario_La_Pasarela.csv");
    }

    function exportarCostosExcel() {
        let csv = "Plato,Costo Produccion,Detalle Insumos\n";
        platos.forEach(p => csv += `${p.nombre},${p.costo},"${p.detalle}"\n`);
        descargarCSV(csv, "Resumen_Costos_Platos.csv");
    }

    function descargarCSV(contenido, nombreArchivo) {
        const blob = new Blob([contenido], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", nombreArchivo);
        link.click();
    }

    function actualizarGrafico() {
        const ctx = document.getElementById('graficoCostos').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, { type: 'bar', data: { labels: platos.map(p => p.nombre), datasets: [{ label: 'Costo $', data: platos.map(p => p.costo), backgroundColor: '#d4a373' }] }, options: { responsive: true, maintainAspectRatio: false } });
    }
</script>
</body>
</html>
