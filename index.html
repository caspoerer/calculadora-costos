<script>
    // 1. PEGA AQUÍ TU URL DE GOOGLE (La que termina en /exec)
    const MI_URL_DE_GOOGLE = "https://script.google.com/macros/s/AKfycbzRLGnM-3FGugmyiyH__YxblnfpTpljKcbD0HAx6Geu_2wu2LvNXGPNc6aspVbN1O3P/exec"; 

    let ingredientes = [];
    let platos = JSON.parse(localStorage.getItem('platos')) || [];
    let chart;

    const coloresCat = {
        "Fondo": "#e74c3c", "Aperitivo": "#f1c40f", "Hamburguesa/Sandwich": "#d4a373", "Alcohol": "#9b59b6", "Bebida": "#3498db"
    };

    // FUNCIÓN PARA CARGAR DESDE LA NUBE (Android y Público)
    async function cargarDesdeNube() {
        try {
            const respuesta = await fetch(MI_URL_DE_GOOGLE);
            const filas = await respuesta.json();
            ingredientes = filas.map(f => ({
                nom: f[0], cat: f[1], pre: f[2], mer: f[3], uni: 'un'
            }));
            renderInventario();
            renderResumenConsolidado();
        } catch (error) {
            console.log("Cargando datos locales o esperando conexión...");
        }
    }

    // FUNCIÓN PARA GUARDAR EN LA NUBE (Desde el Mac)
    async function guardarIngrediente() {
        const data = {
            nom: document.getElementById('ingNom').value,
            cat: document.getElementById('ingCat').value,
            pre: document.getElementById('ingPre').value,
            mer: document.getElementById('ingMerma').value
        };

        if(!data.nom || !data.pre) return alert("Completa los datos");

        // Mostrar aviso de carga
        const btn = document.getElementById('btnGuardarIng');
        btn.innerText = "SINCRONIZANDO...";
        btn.disabled = true;

        await fetch(MI_URL_DE_GOOGLE, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(data)
        });

        alert("¡Éxito! Guardado en Google Sheets y disponible para el público.");
        location.reload();
    }

    // --- EL RESTO DE LAS FUNCIONES SE MANTIENEN IGUAL ---

    function openTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        if(tabId === 'inventario') renderInventario();
        if(tabId === 'resumen') renderResumenConsolidado();
    }

    function renderInventario() {
        const tbody = document.querySelector('#tablaGralInventario tbody');
        if(!tbody) return;
        tbody.innerHTML = ingredientes.map((ing, i) => `
            <tr>
                <td>${ing.nom}</td>
                <td>${ing.cat}</td>
                <td>$${ing.pre}</td>
                <td><button class="borrar-btn">Nube</button></td>
            </tr>
        `).join('');
    }

    function agregarFilaIngrediente(ingIdx = 0, cant = "", uni = "base") {
        const div = document.getElementById('contenedorIngredientesReceta');
        const ops = ingredientes.map((ing, i) => `<option value="${i}">${ing.nom}</option>`).join('');
        const html = `
            <div class="fila-receta" style="display:flex; gap:5px;">
                <select class="selIng" style="flex:2">${ops}</select>
                <input type="number" class="cantIng" value="${cant}" placeholder="Cant." style="flex:1">
                <select class="uniUso" style="flex:1">
                    <option value="base">Unidad</option>
                    <option value="gr">gr/ml</option>
                </select>
            </div>`;
        div.insertAdjacentHTML('beforeend', html);
    }

    function guardarPlato() {
        const sels = document.querySelectorAll('.selIng');
        const cants = document.querySelectorAll('.cantIng');
        const unis = document.querySelectorAll('.uniUso');
        let costoTotal = 0;
        let items = [];

        sels.forEach((sel, i) => {
            const ing = ingredientes[sel.value];
            const cantVal = parseFloat(cants[i].value);
            const uniVal = unis[i].value;
            let pReal = ing.pre / (1 - (ing.mer/100));
            if(uniVal === 'gr') pReal /= 1000;
            costoTotal += pReal * cantVal;
            items.push({ ingIdx: sel.value, cant: cantVal, uni: uniVal });
        });

        platos.push({
            nombre: document.getElementById('platoNom').value,
            categoria: document.getElementById('platoCat').value,
            costo: Math.round(costoTotal)
        });

        localStorage.setItem('platos', JSON.stringify(platos));
        location.reload();
    }

    function renderResumenConsolidado() {
        const tbody = document.querySelector('#tablaPlatosConsolidado tbody');
        if(!tbody) return;
        tbody.innerHTML = platos.map((p, i) => `
            <tr>
                <td>${p.nombre}</td>
                <td>${p.categoria}</td>
                <td>$${p.costo.toLocaleString()}</td>
                <td><button class="borrar-btn" onclick="platos.splice(${i},1); localStorage.setItem('platos', JSON.stringify(platos)); location.reload();">X</button></td>
            </tr>
        `).join('');
        actualizarGrafico();
    }

    function actualizarGrafico() {
        const ctx = document.getElementById('graficoCostos').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: platos.map(p => p.nombre),
                datasets: [{
                    label: 'Costo ($)',
                    data: platos.map(p => p.costo),
                    backgroundColor: platos.map(p => coloresCat[p.categoria] || '#999'),
                    indexAxis: 'y'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    // Iniciar carga
    window.onload = cargarDesdeNube;
</script>
</body>
</html>
