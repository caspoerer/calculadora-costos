<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Pasarela - Gestión Total</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --secondary: #d4a373; --bg: #f4f7f6; --text: #333; --accent: #e74c3c; --edit: #3498db; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; padding-bottom: 60px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; position: sticky; top: 0; background: var(--bg); z-index: 10; padding: 5px 0; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #ddd; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.75rem; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; font-size: 14px; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; }
        .btn-acc { width: auto; padding: 6px 10px; font-size: 11px; margin: 2px; display: inline-block; cursor: pointer; border-radius: 4px; border: none; color: white; }
        .btn-edit { background: var(--edit); }
        .btn-del { background: var(--accent); }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        .fila-receta { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid var(--secondary); }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="cambiarTab('registro')">Insumos</button>
        <button class="tab-btn" onclick="cambiarTab('recetas')">Recetas</button>
        <button class="tab-btn" onclick="cambiarTab('inventario')">Ver Insumos</button>
        <button class="tab-btn" onclick="cambiarTab('resumen')">Consolidado</button>
    </div>

    <div id="registro" class="tab-content active">
        <div class="card">
            <h2 id="editTitle">Nuevo Insumo</h2>
            <input type="text" id="ingNom" placeholder="Nombre">
            <select id="ingCat"><option>Proteína</option><option>No Proteína</option></select>
            <select id="ingUniCompra"><option value="kg">Kilo</option><option value="lt">Litro</option><option value="un">Unidad</option></select>
            <input type="number" id="ingPre" placeholder="Precio">
            <input type="number" id="ingMerma" value="0" placeholder="% Merma">
            <button onclick="enviarInsumo()">GUARDAR INSUMO</button>
        </div>
    </div>

    <div id="recetas" class="tab-content">
        <div class="card">
            <h2>Crear Receta</h2>
            <input type="text" id="platoNom" placeholder="Nombre del Plato">
            <div id="listaIngredientes"></div>
            <button onclick="nuevaFila()" style="background:var(--secondary)">+ AÑADIR INSUMO</button>
            <button onclick="guardarReceta()" style="background:#27ae60; margin-top:10px;">SINCRONIZAR PLATO</button>
        </div>
    </div>

    <div id="inventario" class="tab-content">
        <div class="card">
            <h2>Insumos Registrados</h2>
            <table id="tablaInventario">
                <thead><tr><th>Nombre</th><th>Precio</th><th>Acciones</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="resumen" class="tab-content">
        <div class="card">
            <h2>Consolidado de Recetas</h2>
            <div style="height:200px;"><canvas id="miGrafico"></canvas></div>
            <table id="tablaPlatos">
                <thead><tr><th>Plato</th><th>Costo</th><th>Acciones</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

<script>
    const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbx8ajSEeIna5Aam3cxp5QlBhG866CwncyK1TcQV-CtRf6Acmdosd2Z3o4HZWAWzu9NMLw/exec"; 
    let baseInsumos = [];
    let baseRecetas = [];
    let chart;

    window.onload = cargarTodo;

    async function cargarTodo() {
        try {
            const res = await fetch(URL_GOOGLE);
            const data = await res.json();
            baseInsumos = data.insumos.slice(1);
            baseRecetas = data.recetas.slice(1);
            renderizar();
        } catch(e) { console.log("Error de carga"); }
    }

    function cambiarTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(event) event.currentTarget.classList.add('active');
    }

    async function eliminarFila(tipo, index) {
        if(!confirm("¿Estás seguro de eliminar este registro?")) return;
        const sheet = (tipo === 'insumo') ? "Insumos" : "Recetas";
        await fetch(URL_GOOGLE, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ action: "delete", sheet: sheet, row: index }) 
        });
        alert("Eliminando... La página se recargará.");
        location.reload();
    }

    async function enviarInsumo() {
        const d = {
            nom: document.getElementById('ingNom').value,
            cat: document.getElementById('ingCat').value,
            pre: document.getElementById('ingPre').value,
            mer: document.getElementById('ingMerma').value,
            uni: document.getElementById('ingUniCompra').value
        };
        await fetch(URL_GOOGLE, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
        location.reload();
    }

    function nuevaFila() {
        const cont = document.getElementById('listaIngredientes');
        const opciones = baseInsumos.map((ing, i) => `<option value="${i}">${ing[0]}</option>`).join('');
        cont.insertAdjacentHTML('beforeend', `
            <div class="fila-receta">
                <select class="selI">${opciones}</select>
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <input type="number" class="cantI" placeholder="Cant." style="flex:2">
                    <select class="tipoU" style="flex:1"><option value="gr">gr/ml</option><option value="un">Un</option></select>
                </div>
            </div>`);
    }

    async function guardarReceta() {
        const nom = document.getElementById('platoNom').value;
        const sels = document.querySelectorAll('.selI');
        const cants = document.querySelectorAll('.cantI');
        const tipos = document.querySelectorAll('.tipoU');
        let costoTotal = 0;
        sels.forEach((s, i) => {
            const ing = baseInsumos[s.value];
            const pReal = ing[2] / (1 - (ing[3]/100));
            costoTotal += (tipos[i].value === 'gr') ? (pReal/1000)*cants[i].value : pReal*cants[i].value;
        });
        await fetch(URL_GOOGLE, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ nombre: nom, categoria: "General", costo: Math.round(costoTotal) }) 
        });
        location.reload();
    }

    function renderizar() {
        const tI = document.querySelector('#tablaInventario tbody');
        tI.innerHTML = baseInsumos.map((i, idx) => `
            <tr>
                <td>${i[0]}</td>
                <td>$${i[2].toLocaleString()}</td>
                <td>
                    <button class="btn-acc btn-edit" onclick="editarIng(${idx})">E</button>
                    <button class="btn-acc btn-del" onclick="eliminarFila('insumo', ${idx})">X</button>
                </td>
            </tr>`).join('');

        const tR = document.querySelector('#tablaPlatos tbody');
        tR.innerHTML = baseRecetas.map((p, idx) => `
            <tr>
                <td>${p[0]}</td>
                <td>$${p[2].toLocaleString()}</td>
                <td>
                    <button class="btn-acc btn-edit" onclick="editarPlato(${idx})">E</button>
                    <button class="btn-acc btn-del" onclick="eliminarFila('receta', ${idx})">X</button>
                </td>
            </tr>`).join('');
        dibujar();
    }

    function editarIng(idx) {
        const i = baseInsumos[idx];
        document.getElementById('ingNom').value = i[0];
        document.getElementById('ingPre').value = i[2];
        document.getElementById('ingMerma').value = i[3];
        cambiarTab('registro');
    }

    function editarPlato(idx) {
        document.getElementById('platoNom').value = baseRecetas[idx][0];
        cambiarTab('recetas');
    }

    function dibujar() {
        const ctx = document.getElementById('miGrafico').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, { 
            type:'bar', 
            data: { labels: baseRecetas.map(p=>p[0]), datasets:[{label:'Costo', data:baseRecetas.map(p=>p[2]), backgroundColor:'#d4a373'}] }, 
            options:{indexAxis:'y', responsive:true, maintainAspectRatio:false} 
        });
    }
</script>
</body>
</html>
