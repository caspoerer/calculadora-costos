<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Pasarela - Gestión Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --secondary: #d4a373; --bg: #f4f7f6; --text: #333; --accent: #e74c3c; --success: #27ae60; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; padding-bottom: 60px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; position: sticky; top: 0; background: var(--bg); z-index: 10; padding: 5px 0; overflow-x: auto; }
        .tab-btn { padding: 10px 15px; border: none; background: #ddd; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.7rem; white-space: nowrap; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .receta-detalle { font-size: 0.75rem; background: #fefae0; padding: 10px; border-radius: 8px; margin-top: 5px; border: 1px dashed #d4a373; }
        .cat-tag { font-size: 0.65rem; background: var(--secondary); color: white; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
        .btn-xl { background: #1d6f42; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="cambiarTab('registro')">Insumos</button>
        <button class="tab-btn" onclick="cambiarTab('recetas')">Crear Receta</button>
        <button class="tab-btn" onclick="cambiarTab('resumen')">Consolidado / Carta</button>
    </div>

    <div id="registro" class="tab-content active">
        <div class="card">
            <h2>Nuevo Insumo</h2>
            <input type="text" id="ingNom" placeholder="Nombre">
            <input type="number" id="ingPre" placeholder="Precio Compra">
            <input type="number" id="ingMerma" value="0" placeholder="% Merma">
            <select id="ingUniCompra"><option value="kg">Kilo</option><option value="un">Unidad</option></select>
            <button onclick="enviarInsumo()">GUARDAR INSUMO</button>
        </div>
    </div>

    <div id="recetas" class="tab-content">
        <div class="card">
            <h2>Configurar Plato</h2>
            <input type="text" id="platoNom" placeholder="Nombre del Plato">
            <select id="platoTipo">
                <option>Entrada</option>
                <option>Hamburguesa/Sandwich</option>
                <option>Plato de Fondo</option>
                <option>Ensalada</option>
                <option>Postre</option>
                <option>Bebestible con Alcohol</option>
                <option>Bebestible sin Alcohol</option>
            </select>
            <div id="listaIngredientes"></div>
            <button onclick="nuevaFila()" style="background:var(--secondary)">+ AÑADIR INGREDIENTE</button>
            <button onclick="guardarReceta()" style="background:var(--success); margin-top:10px;">GUARDAR EN LA NUBE</button>
        </div>
    </div>

    <div id="resumen" class="tab-content">
        <button onclick="exportarExcel()" class="btn-xl">📊 DESCARGAR EXCEL COMPLETO</button>
        <div id="contenedorCategorias"></div>
    </div>

<script>
    const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbwZSRn5i1s0O8TyeNlqrBixBLvr5a-pDzaeRstVhGoBKLbydZ1CI341BSZ_1yWh3qHFDg/exec";
    let baseInsumos = [];
    let baseRecetas = [];

    window.onload = cargarTodo;

    async function cargarTodo() {
        const res = await fetch(URL_GOOGLE);
        const data = await res.json();
        baseInsumos = data.insumos;
        baseRecetas = data.recetas;
        renderizar();
    }

    function cambiarTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(event) event.currentTarget.classList.add('active');
    }

    async function enviarInsumo() {
        const d = {
            nom: document.getElementById('ingNom').value,
            cat: "General",
            pre: document.getElementById('ingPre').value,
            mer: document.getElementById('ingMerma').value,
            uni: document.getElementById('ingUniCompra').value,
            esReceta: false
        };
        await fetch(URL_GOOGLE, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
        location.reload();
    }

    function nuevaFila() {
        const cont = document.getElementById('listaIngredientes');
        const opciones = baseInsumos.map(i => `<option value="${i[0]}">${i[0]}</option>`).join('');
        cont.insertAdjacentHTML('beforeend', `
            <div class="fila-receta" style="display:flex; gap:5px; margin-bottom:5px;">
                <select class="selI" style="flex:2">${opciones}</select>
                <input type="number" class="cantI" placeholder="Cant" style="flex:1">
                <select class="tipoU" style="flex:1"><option value="gr">gr/ml</option><option value="un">un</option></select>
            </div>`);
    }

    async function guardarReceta() {
        const nom = document.getElementById('platoNom').value;
        const tipo = document.getElementById('platoTipo').value;
        const sels = document.querySelectorAll('.selI');
        const cants = document.querySelectorAll('.cantI');
        const tipos = document.querySelectorAll('.tipoU');
        
        let lista = [];
        sels.forEach((s, i) => {
            lista.push({ nombreInsumo: s.value, cantidad: cants[i].value, tipo: tipos[i].value });
        });

        await fetch(URL_GOOGLE, { 
            method: 'POST', mode: 'no-cors', 
            body: JSON.stringify({ nombre: nom, tipoPlato: tipo, ingredientes: lista, esReceta: true }) 
        });
        location.reload();
    }

    function renderizar() {
        const cont = document.getElementById('contenedorCategorias');
        cont.innerHTML = '';
        
        const categorias = ["Entrada", "Hamburguesa/Sandwich", "Plato de Fondo", "Ensalada", "Postre", "Bebestible con Alcohol", "Bebestible sin Alcohol"];
        
        categorias.forEach(cat => {
            const platosCat = baseRecetas.filter(r => r[2] === cat);
            if(platosCat.length === 0) return;

            let html = `<div class="card"><h3>${cat}</h3>`;
            platosCat.forEach((r, idx) => {
                let costoPlato = 0;
                let detalleHtml = '<ul>';
                const ingrs = JSON.parse(r[1]);

                ingrs.forEach(ing => {
                    const vivo = baseInsumos.find(b => b[0] === ing.nombreInsumo);
                    let subtotal = 0;
                    if(vivo) {
                        const pReal = vivo[2] / (1 - (vivo[3]/100));
                        subtotal = (ing.tipo === 'gr') ? (pReal/1000)*ing.cantidad : pReal*ing.cantidad;
                        costoPlato += subtotal;
                    }
                    detalleHtml += `<li>${ing.nombreInsumo}: ${ing.cantidad}${ing.tipo} ($${Math.round(subtotal)})</li>`;
                });
                detalleHtml += '</ul>';

                html += `
                    <div style="border-bottom:1px solid #eee; padding:10px 0;">
                        <div style="display:flex; justify-content:space-between; font-weight:bold;">
                            <span>${r[0]}</span>
                            <span style="color:var(--success)">$${Math.round(costoPlato).toLocaleString()}</span>
                        </div>
                        <div class="receta-detalle">${detalleHtml}</div>
                    </div>`;
            });
            html += `</div>`;
            cont.insertAdjacentHTML('beforeend', html);
        });
    }

    function exportarExcel() {
        let datosExcel = [["Categoría", "Plato", "Ingrediente", "Cantidad", "Unidad", "Costo Proporcional"]];
        
        baseRecetas.forEach(r => {
            const ingrs = JSON.parse(r[1]);
            ingrs.forEach(ing => {
                const vivo = baseInsumos.find(b => b[0] === ing.nombreInsumo);
                let subtotal = 0;
                if(vivo) {
                    const pReal = vivo[2] / (1 - (vivo[3]/100));
                    subtotal = (ing.tipo === 'gr') ? (pReal/1000)*ing.cantidad : pReal*ing.cantidad;
                }
                datosExcel.push([r[2], r[0], ing.nombreInsumo, ing.cantidad, ing.tipo, Math.round(subtotal)]);
            });
        });

        const ws = XLSX.utils.aoa_to_sheet(datosExcel);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Costos La Pasarela");
        XLSX.writeFile(wb, "Consolidado_Recetas_Pasarela.xlsx");
    }
</script>
</body>
</html>
